name: Release to npm

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    environment: ERP-PRO-UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Resolve publish state
        id: publish_state
        shell: bash
        run: |
          PACKAGE_NAME=$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('packages/ui/package.json', 'utf8')); process.stdout.write(pkg.name)")
          PACKAGE_VERSION=$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('packages/ui/package.json', 'utf8')); process.stdout.write(pkg.version)")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)

          if [ "$PACKAGE_VERSION" = "$PUBLISHED_VERSION" ]; then
            SHOULD_PUBLISH=false
          else
            SHOULD_PUBLISH=true
          fi

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"

      - name: Build npm package
        if: steps.publish_state.outputs.should_publish == 'true'
        run: pnpm --filter ./packages/ui build

      - name: Publish npm package
        if: steps.publish_state.outputs.should_publish == 'true'
        run: pnpm --filter ./packages/ui publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_ERP_PRO_UI }}

      - name: Skip publish
        if: steps.publish_state.outputs.should_publish != 'true'
        run: |
          echo "Skipping publish for ${{ steps.publish_state.outputs.package_name }}"
          echo "Package version ${{ steps.publish_state.outputs.package_version }} is already published on npm."
